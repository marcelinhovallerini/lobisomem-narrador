<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Narrador de Lobisomem</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}

button{
font-size:20px;
padding:10px 20px;
margin:10px;
cursor:pointer;
}

#log{
margin-top:30px;
font-size:24px;
min-height:80px;
}

.personagem{
display:block;
margin:4px;
}

</style>
</head>

<body>

<h1>Narrador de Lobisomem</h1>

<button onclick="iniciarNoite()">Iniciar Noite</button>
<button onclick="reiniciarJogo()">Reiniciar Jogo</button>

<h2>Personagens</h2>

<div id="personagens">

<label class="personagem"><input type="checkbox" value="Lobisomem"> Lobisomem</label>
<label class="personagem"><input type="checkbox" value="Lobisomem Alfa"> Lobisomem Alfa</label>
<label class="personagem"><input type="checkbox" value="Lobisomem Místico"> Lobisomem Místico</label>

<label class="personagem"><input type="checkbox" value="Vidente"> Vidente</label>
<label class="personagem"><input type="checkbox" value="Aprendiz de Vidente"> Aprendiz de Vidente</label>

<label class="personagem"><input type="checkbox" value="Ladrão"> Ladrão</label>
<label class="personagem"><input type="checkbox" value="Bêbado"> Bêbado</label>

<label class="personagem"><input type="checkbox" value="Insone"> Insone</label>
<label class="personagem"><input type="checkbox" value="Investigador Paranormal"> Investigador Paranormal</label>

<label class="personagem"><input type="checkbox" value="Bruxa"> Bruxa</label>
<label class="personagem"><input type="checkbox" value="Segurança"> Segurança</label>

<label class="personagem"><input type="checkbox" value="Caçador"> Caçador</label>

<label class="personagem"><input type="checkbox" value="Tanner"> Tanner</label>

<label class="personagem"><input type="checkbox" value="Aldeão"> Aldeão</label>
<label class="personagem"><input type="checkbox" value="Sonâmbulo"> Sonâmbulo</label>

</div>

<div id="log">Aguardando início...</div>

<audio id="somFloresta" loop>
<source src="sons/floresta.mp3" type="audio/mpeg">
</audio>

<audio id="uivoLobo">
<source src="sons/uivo.mp3" type="audio/mpeg">
</audio>

<script>

const log = document.getElementById("log")

const somFloresta = document.getElementById("somFloresta")
const uivoLobo = document.getElementById("uivoLobo")

somFloresta.volume = 0.4

let ordem = []
let indice = 0
let jogoRodando = false
let timer = null

function falar(texto){

return new Promise(resolve=>{

log.innerText = texto

let fala = new SpeechSynthesisUtterance(texto)
fala.lang = "pt-BR"

fala.onend = resolve

speechSynthesis.speak(fala)

})

}

function pegarPersonagens(){

let selecionados = []

document
.querySelectorAll("#personagens input:checked")
.forEach(el=>{
selecionados.push(el.value)
})

return selecionados

}

async function iniciarNoite(){

if(jogoRodando) return

jogoRodando = true

speechSynthesis.cancel()

somFloresta.currentTime = 0
somFloresta.play().catch(()=>{})

ordem = pegarPersonagens()

indice = 0

await falar("A noite caiu. Todos fechem os olhos.")

proximo()

}

async function proximo(){

if(!jogoRodando) return

if(indice >= ordem.length){

await falar("Tempo encerrado. Todos acordem. Hora de votar.")

jogoRodando = false
return
}

let personagem = ordem[indice]

if(personagem.includes("Lobisomem")){

uivoLobo.currentTime = 0
uivoLobo.play()

}

await falar(personagem + ", acorde e faça sua ação.")

timer = setTimeout(async ()=>{

await falar(personagem + ", volte a dormir.")

indice++

proximo()

},5000)

}

function reiniciarJogo(){

jogoRodando = false

clearTimeout(timer)

speechSynthesis.cancel()

somFloresta.pause()
somFloresta.currentTime = 0

indice = 0
ordem = []

log.innerText = "Jogo reiniciado."

}

</script>

</body>
</html>
