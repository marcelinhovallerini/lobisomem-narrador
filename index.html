<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narrador One Night Werewolf</title>
<link rel="stylesheet" href="style.css">
</head>
  
<body>

<h1>🐺 Narrador Werewolf</h1>

<h2 id="roles-title">Selecione os personagens</h2>

<div id="roles-container" class="roles">

	<button class="role" onclick="toggleRole(this,'sentinel')">🛡 Sentinela</button>
	<button class="role" onclick="toggleRole(this,'doppelganger')">😶‍🌫️ Doppelganger</button>
	<button class="role" onclick="toggleRole(this,'werewolf')">🐺 Lobisomem</button>
	<button class="role" onclick="toggleRole(this,'alpha')">🐺💪 Lobisomem Alfa</button>
	<button class="role" onclick="toggleRole(this,'mystic')">🐺🔮 Lobisomem Místico</button>
	<button class="role" onclick="toggleRole(this,'dream')">🐺 Lobisomem dos Sonhos</button>
	<button class="role" onclick="toggleRole(this,'minion')">😈 Minion</button>
	<button class="role" onclick="toggleRole(this,'mason')">💍 Maçon</button>
	<button class="role" onclick="toggleRole(this,'seer')">🔮 Vidente</button>
	<button class="role" onclick="toggleRole(this,'apprentice')">🔮👶 Aprendiz de Vidente</button>
	<button class="role" onclick="toggleRole(this,'pi')">👻 Investigador Paranormal</button>
	<button class="role" onclick="toggleRole(this,'robber')">🗡️ Ladrão</button>
	<button class="role" onclick="toggleRole(this,'witch')">🧹 Bruxa</button>
	<button class="role" onclick="toggleRole(this,'idiot')">🤡 Idiota da Vila</button>
	<button class="role" onclick="toggleRole(this,'troublemaker')">🔀 Encrenqueiro</button>
	<button class="role" onclick="toggleRole(this,'drunk')">🍺 Bêbado</button>
	<button class="role" onclick="toggleRole(this,'insomniac')">👁️ Insone</button>
	<button class="role" onclick="toggleRole(this,'revealer')">🌟 Revelador</button>
	<button class="role" onclick="toggleRole(this,'curator')">🧪 Curador</button>
	<button class="role" onclick="toggleRole(this,'tanner')">🔥 Tanner</button>
	<button class="role" onclick="toggleRole(this,'hunter')">🏹 Caçador</button>
	<button class="role" onclick="toggleRole(this,'villager')">😐 Aldeão</button>

</div>

<br>


<button id="start-container" class="start" onclick="startNight()">🌙 Iniciar Noite</button>
<button class="reset" onclick="resetGame()">Reiniciar</button>

<div id="timer-container" style="display:none;">

    <div id="timer-label">Tempo de discussão</div>
    <div id="timer">05:00</div>

</div>

<audio id="forestSound" src="floresta.mp3"></audio>
<audio id="owlSound" src="owl.mp3"></audio>
<audio id="howlSound" src="uivo.mp3"></audio>
<audio id="voicePlayer"></audio>

<script src="app.js"></script>

</body>
</html>
